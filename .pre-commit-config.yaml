repos:
- repo: local
  hooks:
  - id: frontend-type-check
    name: Frontend TypeScript type check
    entry: bash -c 'cd frontend && pnpm i && pnpm tsc --noEmit'
    language: system
    stages: [pre-commit]
    pass_filenames: false
    always_run: true
  - id: frontend-lint
    name: Frontend ESLint
    entry: bash -c 'cd frontend && pnpm i && pnpm lint'
    language: system
    stages: [pre-commit]
    pass_filenames: false
    always_run: true
  - id: backend-ruff-check
    name: Backend ruff check
    entry: bash -c 'cd backend && uv run ruff check .'
    language: system
    stages: [pre-commit]
    pass_filenames: false
    always_run: true
  - id: backend-ruff-format
    name: Backend ruff format
    entry: bash -c 'cd backend && uv run ruff format --check .'
    language: system
    stages: [pre-commit]
    pass_filenames: false
    always_run: true
- repo: https://github.com/zizmorcore/zizmor-pre-commit
  rev: v1.25.2
  hooks:
  - id: zizmor
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: check-merge-conflict
  - id: check-yaml
  - id: check-json
    exclude: ^(\.vscode/|tsconfig)
  - id: trailing-whitespace
    exclude: (frontend/node_modules)
  - id: end-of-file-fixer
    exclude: (frontend/node_modules)
  - id: detect-private-key
  - id: check-added-large-files
  - id: debug-statements
- repo: local
  hooks:
  - id: backend-mypy
    name: Backend mypy type check
    entry: bash -c 'cd backend && uv run mypy .'
    language: system
    types: [python]
    pass_filenames: false
    always_run: true
